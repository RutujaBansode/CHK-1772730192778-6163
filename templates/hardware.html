<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardware Monitor - ClimateImpact AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .hardware-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .hardware-header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .hardware-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .hardware-header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .sensor-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .sensor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .sensor-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .sensor-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .sensor-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .sensor-unit {
            font-size: 1rem;
            color: #666;
            font-weight: 500;
        }

        .sensor-status {
            margin-top: 15px;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-block;
        }

        .status-good {
            background: #d4edda;
            color: #155724;
        }

        .status-warning {
            background: #fff3cd;
            color: #856404;
        }

        .status-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .last-updated {
            text-align: center;
            color: white;
            opacity: 0.8;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 500;
            z-index: 1000;
        }

        .connection-online {
            background: #d4edda;
            color: #155724;
        }

        .connection-offline {
            background: #f8d7da;
            color: #721c24;
        }

        .close-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: background 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .date-time-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .date-time-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .date-time-display {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .date-display, .time-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .date-label, .time-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #667eea;
        }

        .date-value, .time-value {
            font-size: 1rem;
            font-weight: 700;
            color: #333;
            font-family: 'Courier New', monospace;
        }

        @media (max-width: 768px) {
            .hardware-header h1 {
                font-size: 2rem;
            }

            .sensor-grid {
                grid-template-columns: 1fr;
            }

            .sensor-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Sparkle Animation Background -->
    <div class="sparkle-container"></div>

    <button class="close-btn" onclick="window.close()" title="Close">✕</button>

    <div class="connection-status connection-online" id="connectionStatus">
        ● Online
    </div>

    <div class="hardware-container">
        <div class="hardware-header">
            <h1>🔧 Hardware Monitor</h1>
            <p>Real-time sensor data from ESP32 microcontroller</p>
        </div>

        <div class="sensor-grid">
            <!-- Temperature Sensor -->
            <div class="sensor-card">
                <span class="sensor-icon">🌡️</span>
                <div class="sensor-title">Temperature</div>
                <div class="sensor-value" id="tempValue">--</div>
                <div class="sensor-unit">°C</div>
                <div class="sensor-status status-good" id="tempStatus">Normal</div>
            </div>

            <!-- Humidity Sensor -->
            <div class="sensor-card">
                <span class="sensor-icon">💧</span>
                <div class="sensor-title">Humidity</div>
                <div class="sensor-value" id="humValue">--</div>
                <div class="sensor-unit">%</div>
                <div class="sensor-status status-good" id="humStatus">Optimal</div>
            </div>

            <!-- Air Quality Sensor -->
            <div class="sensor-card">
                <span class="sensor-icon">🏭</span>
                <div class="sensor-title">Air Quality</div>
                <div class="sensor-value" id="aqValue">--</div>
                <div class="sensor-unit">MQ135</div>
                <div class="sensor-status status-good" id="aqStatus">Good</div>
            </div>
        </div>

        <div class="last-updated" id="lastUpdated">
            Last updated: Never
        </div>
    </div>

    <script>
        let updateInterval;

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Hardware Monitor initialized');
            startDataUpdates();
        });

        // Start automatic data updates
        function startDataUpdates() {
            // Initial fetch
            fetchSensorData();

            // Update every 2-3 seconds
            updateInterval = setInterval(fetchSensorData, 2500);
        }

        // Fetch sensor data from backend
        async function fetchSensorData() {
            try {
                const response = await fetch('/api/hardware-data');
                const data = await response.json();

                if (data.success) {
                    updateSensorDisplay(data);
                    updateConnectionStatus(true);
                } else {
                    console.error('API returned error:', data.error);
                    updateConnectionStatus(false);
                }
            } catch (error) {
                console.error('Failed to fetch sensor data:', error);
                updateConnectionStatus(false);
            }
        }

        // Update sensor display values
        function updateSensorDisplay(data) {
            const sensors = data.sensors;

            // Temperature
            if (sensors.temperature !== undefined) {
                document.getElementById('tempValue').textContent = sensors.temperature;
                updateTempStatus(sensors.temperature);
            }

            // Humidity
            if (sensors.humidity !== undefined) {
                document.getElementById('humValue').textContent = sensors.humidity;
                updateHumStatus(sensors.humidity);
            }

            // Air Quality
            if (sensors.air_quality !== undefined) {
                document.getElementById('aqValue').textContent = sensors.air_quality;
                updateAQStatus(sensors.air_quality);
            }

            // Update timestamp
            document.getElementById('lastUpdated').textContent =
                `Last updated: ${new Date().toLocaleTimeString()}`;
        }

        // Update temperature status
        function updateTempStatus(temp) {
            const statusEl = document.getElementById('tempStatus');

            if (temp < 15) {
                statusEl.textContent = 'Cold';
                statusEl.className = 'sensor-status status-warning';
            } else if (temp > 35) {
                statusEl.textContent = 'Hot';
                statusEl.className = 'sensor-status status-danger';
            } else {
                statusEl.textContent = 'Normal';
                statusEl.className = 'sensor-status status-good';
            }
        }

        // Update humidity status
        function updateHumStatus(hum) {
            const statusEl = document.getElementById('humStatus');

            if (hum < 30) {
                statusEl.textContent = 'Dry';
                statusEl.className = 'sensor-status status-warning';
            } else if (hum > 80) {
                statusEl.textContent = 'Humid';
                statusEl.className = 'sensor-status status-warning';
            } else {
                statusEl.textContent = 'Optimal';
                statusEl.className = 'sensor-status status-good';
            }
        }

        // Update air quality status
        function updateAQStatus(aq) {
            const statusEl = document.getElementById('aqStatus');

            if (aq < 200) {
                statusEl.textContent = 'Excellent';
                statusEl.className = 'sensor-status status-good';
            } else if (aq < 400) {
                statusEl.textContent = 'Good';
                statusEl.className = 'sensor-status status-good';
            } else if (aq < 600) {
                statusEl.textContent = 'Moderate';
                statusEl.className = 'sensor-status status-warning';
            } else {
                statusEl.textContent = 'Poor';
                statusEl.className = 'sensor-status status-danger';
            }
        }

        // Update connection status
        function updateConnectionStatus(isOnline) {
            const statusEl = document.getElementById('connectionStatus');

            if (isOnline) {
                statusEl.textContent = '● Online';
                statusEl.className = 'connection-status connection-online';
            } else {
                statusEl.textContent = '● Offline';
                statusEl.className = 'connection-status connection-offline';
            }
        }

        // Clean up interval when page unloads
        window.addEventListener('beforeunload', function() {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
        });

        // --- Sparkle Animation Logic ---
        function createSparkle() {
            const sparkleContainer = document.querySelector('.sparkle-container');
            if (!sparkleContainer) return;

            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';

            // Random horizontal position
            sparkle.style.left = Math.random() * 100 + '%';

            // Random size variation
            const size = Math.random() * 3 + 2; // 2-5px
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';

            // Random animation delay
            sparkle.style.animationDelay = Math.random() * 3 + 's';

            sparkleContainer.appendChild(sparkle);

            // Remove sparkle after animation completes
            setTimeout(() => {
                if (sparkle.parentNode) {
                    sparkle.parentNode.removeChild(sparkle);
                }
            }, 6000); // 6 seconds to cover longest animation
        }

        function initSparkles() {
            const sparkleContainer = document.querySelector('.sparkle-container');
            if (!sparkleContainer) return;

            // Create initial sparkles
            for (let i = 0; i < 15; i++) {
                setTimeout(createSparkle, i * 200);
            }

            // Continuously create new sparkles
            setInterval(createSparkle, 800);
        }

        // Initialize sparkles when DOM is loaded
        initSparkles();
    </script>
</body>
</html>
